spring.application.name=buy-tickets
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

spring.datasource.jwtsecret=${SPRING_DATASOURCE_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

aws.region=${AWS_REGION:us-east-1}
aws.sqs.message-group-id=${AWS_SQS_MESSAGE_GROUP_ID:ticket-reservation-group}

springdoc.swagger-ui.path=/${API_VERSION:v1}/swagger
springdoc.api-docs.path=/${API_VERSION:v1}/api-docs
